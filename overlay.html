<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' file: data: https: http:; style-src 'unsafe-inline'"
    />
    <title>lanpai overlay</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: transparent;
        font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
      }

      .el {
        position: absolute;
        cursor: move;
        user-select: none;
        -webkit-user-drag: none;
      }

      .el:hover {
        outline: 1px dashed rgba(255, 255, 255, 0.6);
      }

      .el .content {
        display: block;
        pointer-events: none;
      }

      .el.text .content {
        color: #fff;
        white-space: pre-wrap;
        line-height: 1.3;
        text-shadow:
          0 0 4px rgba(0, 0, 0, 0.9),
          0 1px 2px rgba(0, 0, 0, 0.9);
      }

      .el.text .content[contenteditable='true'] {
        pointer-events: auto;
        cursor: text;
        user-select: text;
        outline: 1px solid rgba(120, 180, 255, 0.8);
      }

      .el img.content {
        width: 100%;
        height: auto;
        -webkit-user-drag: none;
      }

      .handle {
        position: absolute;
        right: -7px;
        bottom: -7px;
        width: 14px;
        height: 14px;
        border-radius: 3px;
        background: rgba(120, 180, 255, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.9);
        cursor: nwse-resize;
        display: none;
      }

      .el:hover .handle {
        display: block;
      }

      #text-entry {
        position: absolute;
        left: 50%;
        top: 40%;
        transform: translate(-50%, -50%);
        display: none;
      }

      #toolbar {
        position: absolute;
        display: none;
        flex-direction: column;
        gap: 6px;
        padding: 8px;
        background: rgba(20, 20, 20, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 10px;
        z-index: 9999;
      }

      .tb-row {
        display: flex;
        gap: 6px;
        align-items: center;
      }

      .tb-row:empty {
        display: none;
      }

      .swatch {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.5);
        padding: 0;
        cursor: pointer;
      }

      .tb-btn,
      .chip {
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 6px;
        padding: 3px 10px;
        font-size: 13px;
        cursor: pointer;
      }

      .chip {
        font-weight: 700;
        padding: 2px 8px;
        background: rgba(0, 0, 0, 0.6);
      }

      #tb-url {
        width: 240px;
        padding: 4px 8px;
        font-size: 13px;
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 6px;
        background: rgba(0, 0, 0, 0.6);
        color: #fff;
        outline: none;
      }

      .tb-btn:hover,
      .chip:hover,
      .swatch:hover {
        outline: 1px solid rgba(120, 180, 255, 0.9);
      }

      .tb-icon {
        margin-left: auto;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 24px;
        padding: 0;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 6px;
        color: rgba(255, 255, 255, 0.85);
        cursor: pointer;
      }

      .tb-icon:hover {
        color: #ff6b6b;
        border-color: rgba(255, 107, 107, 0.85);
        background: rgba(255, 107, 107, 0.12);
      }

      #restore-prompt {
        position: absolute;
        left: 50%;
        top: 32%;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 18px 22px;
        background: rgba(20, 20, 20, 0.94);
        border: 1px solid rgba(120, 180, 255, 0.5);
        border-radius: 12px;
        z-index: 99999;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
      }

      #restore-prompt .rp-msg {
        color: #fff;
        font-size: 15px;
      }

      #restore-prompt .rp-row {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
      }

      #restore-prompt .rp-btn {
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 7px;
        padding: 6px 16px;
        font-size: 14px;
        cursor: pointer;
      }

      #restore-prompt .rp-btn.rp-yes {
        background: rgba(120, 180, 255, 0.9);
        color: #07101f;
        border-color: transparent;
        font-weight: 600;
      }

      #restore-prompt .rp-btn:hover {
        outline: 1px solid rgba(120, 180, 255, 0.9);
      }

      #text-entry input {
        width: 420px;
        padding: 12px 16px;
        font-size: 22px;
        border: 1px solid rgba(120, 180, 255, 0.8);
        border-radius: 8px;
        background: rgba(20, 20, 20, 0.85);
        color: #fff;
        outline: none;
      }
    </style>
  </head>
  <body>
    <div id="text-entry">
      <input type="text" placeholder="打字加文字、貼圖片網址加圖,Enter 確認,Esc 取消" />
    </div>
    <script src="toolbar.js"></script>
    <script src="overlay.js"></script>
  </body>
</html>
